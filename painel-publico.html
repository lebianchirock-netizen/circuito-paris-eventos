<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Painel do Circuito</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7C1FD6">
<link rel="icon" href="icons/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  body { padding-bottom: 24px; }
  main.painel { max-width: 1100px; }
  .painel-grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .painel-grid-cards .ring { width: 96px; height: 96px; }
  .painel-grid-cards .ring-center .timer { font-size: 18px; }
  .painel-grid-cards .aluno-info .nome { font-size: 17px; }
  .painel-grid-cards .aluno-info .cenario { font-size: 14px; }
  .painel-queue-card { min-width: 200px; }
  .painel-queue-card .nome { font-size: 16px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="assets/paris-eventos-logo.png" alt="Paris Eventos" class="logo logo-paris">
    <span class="logo-divider"></span>
    <img src="assets/enjoy-picture-logo.png" alt="Enjoy Picture" class="logo logo-enjoy">
    <h1>Painel do Circuito</h1>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <span id="sync-status" class="sync-status"></span>
    <div id="clock" class="clock"></div>
    <a href="index.html" class="ext-link">Painel de controle ↗</a>
  </div>
</header>

<main class="painel">
  <div class="view-head">
    <span class="eyebrow">Aguardando</span>
    <h2>Próximos a entrar</h2>
  </div>
  <div id="painel-queue"></div>

  <div class="view-head" style="margin-top:8px;">
    <span class="eyebrow">Agora</span>
    <h2>Em circuito</h2>
  </div>
  <div id="painel-circuito"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/storage.js"></script>
<script src="js/painel.js"></script>
</body>
</html>
